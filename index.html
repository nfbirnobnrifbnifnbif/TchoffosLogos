<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TchoffsLogos Studio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #050816, #020617);
  color:white;
  overflow-x:hidden;
}

.stars, .stars2 {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from {opacity:0.2;}
  to {opacity:1;}
}

.glass {
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
}

#logoBox {
  width:220px;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:28px;
  font-size:64px;
  font-weight:bold;
  transition: all .3s;
}

.badge {
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- NAV -->
<nav class="glass flex justify-between p-4">
  <h1 class="text-blue-400 font-bold text-xl">TchoffsLogos Studio</h1>
  <button onclick="signin()" class="bg-blue-500 px-4 py-2 rounded-xl">Sign In</button>
</nav>

<!-- HERO -->
<section class="text-center py-10">
  <h1 class="text-5xl font-bold">Design Logos Instantly</h1>
  <p class="text-gray-300 mt-2">High-quality logos for brands, websites & business cards</p>
</section>

<!-- APP -->
<section class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8 px-4">

<!-- CONTROLS -->
<div class="glass p-6 rounded-2xl">

<input id="name"
class="w-full p-3 bg-slate-800 rounded mb-3"
placeholder="Business name">

<select id="style" class="w-full p-3 bg-slate-800 rounded mb-3">
<option value="circle">Circle Badge</option>
<option value="square">Square Bold</option>
<option value="gradient">Gradient Pro</option>
<option value="minimal">Minimal</option>
</select>

<div class="flex gap-2 mb-3">
<button onclick="setColor('#3b82f6')" class="w-8 h-8 bg-blue-500 rounded-full"></button>
<button onclick="setColor('#ef4444')" class="w-8 h-8 bg-red-500 rounded-full"></button>
<button onclick="setColor('#22c55e')" class="w-8 h-8 bg-green-500 rounded-full"></button>
<button onclick="setColor('#a855f7')" class="w-8 h-8 bg-purple-500 rounded-full"></button>
</div>

<button onclick="generate()" class="w-full bg-blue-500 py-3 rounded-xl mb-2">
Generate Logo
</button>

<button onclick="download()" class="w-full bg-green-500 py-3 rounded-xl">
Download PNG
</button>

</div>

<!-- PREVIEW -->
<div class="glass p-6 rounded-2xl flex flex-col items-center">

<div id="logoBox" class="bg-blue-500">
T
</div>

<h2 id="text" class="text-2xl mt-4 font-bold">Your Brand</h2>
<p class="badge">Preview updates instantly</p>

</div>

</section>

<script>

let color = "#3b82f6";

function setColor(c){
  color = c;
  document.getElementById("logoBox").style.background = c;
}

// stars
const s=document.getElementById("stars");
for(let i=0;i<150;i++){
  const d=document.createElement("div");
  d.className="star";
  d.style.top=Math.random()*100+"%";
  d.style.left=Math.random()*100+"%";
  s.appendChild(d);
}

// sign in
function signin(){
  const e=prompt("Email");
  if(e) alert("Welcome "+e);
}

// smarter generator
function generate(){
  const name = document.getElementById("name").value || "Brand";
  const style = document.getElementById("style").value;

  const letter = name.trim()[0].toUpperCase();

  const box = document.getElementById("logoBox");
  const text = document.getElementById("text");

  text.innerText = name;
  box.innerText = letter;

  if(style === "circle"){
    box.style.borderRadius = "50%";
    box.style.background = color;
  }

  if(style === "square"){
    box.style.borderRadius = "10px";
    box.style.background = color;
  }

  if(style === "gradient"){
    box.style.borderRadius = "28px";
    box.style.background = "linear-gradient(45deg,#3b82f6,#a855f7)";
  }

  if(style === "minimal"){
    box.style.borderRadius = "0px";
    box.style.background = "transparent";
    box.style.border = "3px solid " + color;
  }
}

// download PNG
function download(){
  html2canvas(document.getElementById("logoBox")).then(canvas=>{
    const a=document.createElement("a");
    a.download="logo.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

</script>

</body>
</html>
